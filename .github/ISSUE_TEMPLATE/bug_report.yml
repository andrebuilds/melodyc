name: Bug report
description: Report a reproducible problem in Melodyc.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please do not report security vulnerabilities here; use the process in SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Clearly describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible set of steps.
      placeholder: |
        1. Go to...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend
        - Backend
        - Documentation
        - Deployment or configuration
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant OS, browser, Node.js, Python, and package versions.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add logs, screenshots, or other useful details. Remove sensitive information before posting.
