name: Feature request
description: Suggest an improvement for Melodyc.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing an idea. Please search existing issues before submitting a new request.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user need or limitation this feature would address.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add mockups, examples, or other useful context.
